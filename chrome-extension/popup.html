<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>karshfruitbot – exporter</title>
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com"
		/>
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--bg: radial-gradient(circle at 20% 20%, #17202e, #0b0f16 40%, #090c12 80%);
				--card: rgba(20, 24, 32, 0.9);
				--shadow: 0 16px 60px rgba(0, 0, 0, 0.35);
				--primary: #ff8f5a;
				--accent: #8ae27d;
				--text: #f4f6fb;
				--muted: #9aa3b5;
				--border: rgba(255, 255, 255, 0.08);
				--chip-bg: rgba(255, 143, 90, 0.12);
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-width: 360px;
				font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
				background: var(--bg);
				color: var(--text);
				overflow: hidden;
			}

			.card {
				position: relative;
				z-index: 1;
				margin: 16px;
				padding: 16px;
				background: var(--card);
				border-radius: 20px;
				box-shadow: var(--shadow);
				backdrop-filter: blur(12px);
				border: 1px solid var(--border);
			}

			header {
				display: flex;
				align-items: center;
				gap: 12px;
				margin-bottom: 8px;
			}

			.logo-text {
				font-size: 16px;
				font-weight: 700;
				letter-spacing: -0.01em;
				display: inline-flex;
				align-items: center;
				gap: 8px;
				color: var(--text);
			}

			.logo-emojis {
				padding: 6px 10px;
				border-radius: 14px;
				background: rgba(255, 143, 90, 0.14);
				border: 1px solid var(--border);
			}

			h1 {
				margin: 0;
				font-size: 14px;
				letter-spacing: -0.01em;
				color: var(--muted);
			}

			.chip-row {
				display: none;
			}

			label {
				display: block;
				margin: 10px 0 6px;
				font-weight: 600;
				font-size: 12px;
				color: var(--muted);
			}

			select,
			input {
				width: 100%;
				padding: 11px 12px;
				border-radius: 14px;
				border: 1px solid var(--border);
				background: rgba(255, 255, 255, 0.05);
				color: var(--text);
				font-size: 13px;
				outline: none;
				transition: transform 140ms ease, box-shadow 140ms ease, border 140ms ease;
			}

			select:focus,
			input:focus {
				transform: translateY(-1px);
				box-shadow: 0 10px 20px rgba(255, 143, 90, 0.25);
				border-color: rgba(255, 143, 90, 0.6);
			}

			.row {
				display: flex;
				gap: 8px;
			}

			textarea,
			pre {
				width: 100%;
				min-height: 150px;
				font-family: 'SFMono-Regular', Menlo, Consolas, monospace;
				font-size: 12px;
				white-space: pre-wrap;
				overflow: auto;
			}

			.btn-row {
				display: flex;
				gap: 10px;
				margin-top: 12px;
			}

			button {
				flex: 1;
				padding: 12px 14px;
				border: none;
				border-radius: 14px;
				font-weight: 700;
				font-size: 13px;
				cursor: pointer;
				transition: transform 140ms ease, box-shadow 160ms ease, opacity 120ms ease;
				color: #0c0f14;
			}

			button:active {
				transform: translateY(1px) scale(0.995);
			}

			.btn-secondary {
				background: rgba(255, 255, 255, 0.08);
				color: var(--text);
				border: 1px solid var(--border);
				box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
			}

			.btn-primary {
				background: linear-gradient(135deg, #ff9f6e, #ff7f50);
				color: #0c0f14;
				box-shadow: 0 14px 30px rgba(255, 127, 80, 0.35);
			}

			.status {
				margin-top: 10px;
				font-size: 12px;
				color: var(--muted);
			}

			.pill {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				padding: 6px 10px;
				border-radius: 999px;
				background: rgba(138, 226, 125, 0.12);
				color: #b8ffb2;
				border: 1px solid var(--border);
				font-size: 12px;
				margin-top: 6px;
			}

			.tiny-note {
				font-size: 11px;
				color: var(--muted);
				margin-top: 8px;
				line-height: 1.4;
			}

			.link-row {
				display: flex;
				gap: 8px;
				margin-top: 10px;
			}

			.link-btn {
				flex: 1;
				padding: 10px 12px;
				border-radius: 12px;
				border: 1px dashed var(--border);
				background: rgba(255, 255, 255, 0.04);
				color: var(--muted);
				font-weight: 600;
				font-size: 12px;
				text-decoration: none;
				text-align: center;
				transition: border 120ms ease, color 120ms ease;
			}

			.link-btn:hover {
				border-color: rgba(255, 143, 90, 0.6);
				color: var(--text);
			}
		</style>
	</head>
	<body>
		<div class="card">
			<header>
				<div>
						<div class="logo-text">
							<span class="logo-emojis">💻🍎🧠🍉</span>
							<span>karshfruitbot exporter</span>
						</div>
						<h1>dark, minimal, fruit-coded</h1>
						<div class="chip-row">
							<span class="chip">🍑 markdown</span>
							<span class="chip">� chat export</span>
							<span class="chip">� telegram</span>
						</div>
				</div>
			</header>

			<div class="pill" id="site-pill">Detecting page…</div>

			<label for="format">Format</label>
			<select id="format">
				<option value="text">Plain text</option>
				<option value="markdown">Markdown</option>
				<option value="json">JSON</option>
			</select>

			<label for="preview">Preview</label>
			<pre id="preview">Waiting for conversation…</pre>
			<div class="link-row">
				<a class="link-btn" id="openBot" href="#">Open bot to capture chat ID</a>
				<a class="link-btn" id="requestSupport" href="#">Request site support</a>
				<a class="link-btn" id="statusLink" href="#">View supported hosts</a>
			</div>

			<div class="btn-row">
				<button class="btn-primary" id="sendToTelegram">Send to Telegram</button>
			</div>

			<div class="status" id="status">Ready.</div>
			<div class="tiny-note">If a new site is approved, reload the extension to pick up manifest changes.</div>
		</div>

		<script src="popup.js" type="module"></script>
	</body>
</html>
